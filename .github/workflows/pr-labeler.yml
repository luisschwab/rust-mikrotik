name: PR Labeler

on: # zizmor: ignore[dangerous-triggers]
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions: {}

jobs:
    labeler:
        name: PR Labeler
        runs-on: ubuntu-slim
        permissions:
            pull-requests: write
        steps:
            - name: Label PR according to modified files
              uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
              with:
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  script: |
                      const changedFiles = await github.paginate(
                        github.rest.pulls.listFiles,
                        {
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          pull_number: context.issue.number,
                        }
                      );

                      // Paths of all the managed labels
                      const filePathsToLabels = {
                        'mikrotik-client/': 'C-client',
                        'mikrotik-common/': 'C-common',
                        'mikrotik-crawler/': 'C-crawler',
                        'mikrotik-graphviz/': 'C-graphviz',
                        'mikrotik-proto2/': 'C-proto2',
                        'mikrotik-qemu-runner/': 'C-qemu',
                        'mikrotik-types/': 'C-types',
                      };

                      const labelsToAdd = new Set();

                      changedFiles.forEach(file => {
                        const filePath = file.filename;
                        for (const [path, label] of Object.entries(filePathsToLabels)) {
                          if (filePath.startsWith(path)) {
                            labelsToAdd.add(label);
                            break;
                          }
                        }
                      });

                      const allKnownLabels = new Set(Object.values(filePathsToLabels));

                      // Add new managed labels
                      if (labelsToAdd.size > 0) {
                        await github.rest.issues.addLabels({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          issue_number: context.issue.number,
                          labels: Array.from(labelsToAdd)
                        });
                      }

                      // Remove any managed labels that no longer apply
                      const currentLabels = (await github.rest.issues.listLabelsOnIssue({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number: context.issue.number,
                      })).data.map(label => label.name);

                      for (const label of currentLabels) {
                        if (allKnownLabels.has(label) && !labelsToAdd.has(label)) {
                          try {
                            await github.rest.issues.removeLabel({
                              owner: context.repo.owner,
                              repo: context.repo.repo,
                              issue_number: context.issue.number,
                              name: label,
                            });
                          } catch (e) {
                            // Ignore 404 in case the label was already removed externally
                            if (e.status !== 404) throw e;
                          }
                        }
                      }
