name = "single-router"
allow_software_emulation = true

[[routers]]
name = "R01"
version = "7.23.1"
memory_mib = 256
cpus = 1
bootstrap = [
  "/system/identity/set name=R01",
  "/certificate/add name=simnet-api common-name=simnet-api key-usage=tls-server",
  "/ip/service/enable numbers=api",
]

[[checks]]
type = "command-rows"
router = "R01"
command = "/certificate/print"
min_rows = 1

[[checks]]
type = "all-print-commands"
router = "R01"
allow_unsupported = true
