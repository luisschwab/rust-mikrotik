version: 2

updates:
    - package-ecosystem: "cargo"
      directory: "/"
      schedule:
          interval: "weekly"
      cooldown:
          default-days: 60
      groups:
          all:
              patterns: ["*"]

    - package-ecosystem: "github-actions"
      directory: "/"
      schedule:
          interval: "weekly"
      cooldown:
          default-days: 60
      groups:
          all:
              patterns: ["*"]
