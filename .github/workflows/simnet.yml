name: Simulated Network

on:
    push:
      branches: [ master ]
    pull_request:
    workflow_dispatch:

permissions: {}
env:
    CARGO_TERM_COLOR: always
    RUST_BACKTRACE: 1
    RBMT_LOG_LEVEL: verbose

jobs:
    topology:
        name: ${{ matrix.name }}
        runs-on: ubuntu-latest
        timeout-minutes: 120
        permissions:
            contents: read
        strategy:
            fail-fast: false
            matrix:
                include:
                    - name: "Single Router"
                      topology: "single-router.toml"
                    - name: "Two Router"
                      topology: "two-router.toml"
                    - name: "Three Router BGP"
                      topology: "three-router-bgp.toml"
                    - name: "Stress Test (All RouterOS versions)"
                      topology: "stress-test.toml"

        steps:
            - name: Checkout Repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  persist-credentials: false

            - name: Install CHR Runtime Tools
              run: |
                  sudo apt update
                  sudo apt install -y curl qemu-system-x86 qemu-utils unzip

            - name: Setup Rust Cache
              uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

            - name: Cache CHR Images
              uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
              with:
                  path: mikrotik-simnet/.chr-cache/images
                  key: simnet-chr-images-${{ runner.os }}-${{ matrix.topology }}-${{ hashFiles(format('mikrotik-simnet/topologies/{0}', matrix.topology)) }}
                  restore-keys: |
                      simnet-chr-images-${{ runner.os }}-${{ matrix.topology }}-

            - name: Setup cargo-rbmt
              uses: ./.github/actions/setup-rbmt

            - name: "Run scenario: ${{ matrix.name }} (${{ matrix.topology }})"
              run: cargo rbmt run run -p mikrotik-simnet -- run --non-interactive ${{ matrix.topology }}

            - name: Upload MikroTik SimNet Logs
              if: always()
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
              with:
                  name: simnet-${{ strategy.job-index }}-logs
                  path: |
                      mikrotik-simnet/.chr-cache/runs/**/*.qemu.args
                      mikrotik-simnet/.chr-cache/runs/**/*.qemu.log
                      mikrotik-simnet/.chr-cache/runs/**/*.print-commands.csv
                      mikrotik-simnet/.chr-cache/runs/**/*.serial.log
                      mikrotik-simnet/.chr-cache/runs/**/topology.csv
                      mikrotik-simnet/.chr-cache/runs/**/topology.mmd
                  if-no-files-found: ignore
                  retention-days: 14
